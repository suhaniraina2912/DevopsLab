<!DOCTYPE html>
<html>
<head>
<title>Online Shopping</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px lightgray;
}

.card img{
width:180px;
height:180px;
object-fit:cover;
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e65c00;
}

</style>

</head>

<body>

<header>
<h1>Welcome to ShopEasy</h1>
<p>Best Deals Every Day!</p>
</header>

<div class="products">

<div class="card">
<img src="https://picsum.photos/200?random=1">
<h3>Wireless Headphones</h3>
<h4>₹2,499</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=2">
<h3>Smart Watch</h3>
<h4>₹3,999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=3">
<h3>Laptop</h3>
<h4>₹59,999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=4">
<h3>Gaming Mouse</h3>
<h4>₹999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=5">
<h3>Bluetooth Speaker</h3>
<h4>₹1,799</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=6">
<h3>DSLR Camera</h3>
<h4>₹45,000</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=7">
<h3>Running Shoes</h3>
<h4>₹2,299</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?random=8">
<h3>Backpack</h3>
<h4>₹1,499</h4>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
