<!DOCTYPE html>
<html>
<head>
<title>Online Shopping</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px lightgray;
}

.card img{
width:180px;
height:180px;
object-fit:cover;
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e65c00;
}

</style>

</head>

<body>

<header>
<h1>Welcome to ShopEasy</h1>
<p>Best Deals Every Day!</p>
</header>

<div class="products">

<div class="card">
<img src="https://www.boat-lifestyle.com/cdn/shop/files/Artboard2_52206726-98d5-45a4-b521-f034ec83e7b6.png?v=1752729573">
<h3>Wireless Headphones</h3>
<h4>₹2,499</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://vaku.in/cdn/shop/files/xtor_jpgArtboard_26_1024x1024.jpg?v=1769510215">
<h3>Smart Watch</h3>
<h4>₹3,999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/510uTHyDqGL._AC_UF1000,1000_QL80_.jpg">
<h3>Laptop</h3>
<h4>₹59,999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61QY3V6A-NL.jpg">
<h3>Gaming Mouse</h3>
<h4>₹999</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSceR6FejDDbD0-hyLurSqBzffxXcbKfV5SqQ4kT7ar3sy0lzVfDNErNGk&s=10">
<h3>Bluetooth Speaker</h3>
<h4>₹1,799</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://x.imastudent.com/content/0003665_nikon-d7500-dslr-with-18-140mm-lens-kit_500.jpeg">
<h3>DSLR Camera</h3>
<h4>₹45,000</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://assets.adidas.com/images/w_500,f_auto,q_auto/aa0bd45abac541d29ff40b492e15cfa4_9366/Runfalcon_5_Running_Shoes_Black_IH7758_HM1.jpg">
<h3>Running Shoes</h3>
<h4>₹2,299</h4>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://cdn.thewirecutter.com/wp-content/media/2022/09/backpacks-2048px.jpg?width=2048&quality=60&crop=2048:1365&auto=webp">
<h3>Backpack</h3>
<h4>₹1,499</h4>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
